# Ouroboros Seed — PNU PlanU (Cursor MVP v1)
# 설계 전환: 이상적 시간표는 사용자 입력. 시스템은 수강 가능 목록 + 이상안을 바탕으로
# 특정 과목 수강신청 실패 시 쓸 플랜 B·C를 생성한다.

goal: >
  부산대(PNU) 재학생 맥락에서, Cursor IDE 내 파이프라인이 **사용자 제공 근거**만으로
  **HTML 문서**를 산출한다. **이상적 시간표를 시스템이 새로 짜는 것은 목표가 아니다**
  — 대부분 학생은 이미 본인 이상안을 갖고 있다. 핵심 가치는 **수강 가능한 강의 목록**
  과 **사용자가 정한 이상적 시간표**를 입력받은 뒤, **특정 과목 수강신청 실패**를 가정할 때
  현장에서 쓸 수 있는 **플랜 B·플랜 C(대체 시간표·행동 가이드)**를 만드는 것이다.
  Streamlit 등 별도 앱 코드는 **사용자가 요청한 경우에만** 선택이다.

constraints:
  - 실행 환경은 Cursor 워크플로 중심(MVP 1순위). 학생용 단독 웹앱은 본 시드 범위 밖(후속).
  - v1 에이전트 협업은 순차 파이프라인 + 오거나이저 합성만. 상호 평가·다라운드 수렴은 v2로 제외.
  - Notion MCP·지도 MCP는 선택. 미사용 시 붙여넣기·수동 입력·워크스페이스 파일로 대체.
  - 졸업요건·개설·캠퍼스 사실은 사용자가 제시한 근거(채팅 인용 + 추출된 파일 본문/표)에 한정; 근거 없는 추정 금지.
  - 공식 학사 시스템을 대체하지 않음. UI/문구에 비공식·참고용 고지.
  - 실시간 경쟁률·대기열 예측 및 교수 스타일 분석은 비목표(제외).
  - 스캔 PDF 등은 사용자가 제공. 텍스트/표 추출 실패 시 오류 안내 후 다른 파일 형식 시도를 권고하고 해당 요청 종료(자동 OCR 재시도 루프 없음).
  - **입력 필수 쌍**: (1) **수강 가능한 강의 목록**(개설·편람 근거에서 정규화된 후보군) (2) **사용자 이상적 시간표**(분반·요일·교시 등 사용자가 넣은 안). 둘 중 하나라도 없거나 모호하면 **플랜 B·C 산출 전**에 질문·파일 요청으로 보완한다. 이상안을 **잘못된 추정으로 덮어쓰지 않는다.**
  - 선호(Soft) 핵심 항목이 비어 있으면 임의로 가정하지 말고, **대체 과목을 고를 때** 필요하면 추가 질문으로 채운다(공강·하루 최대 수업 등).
  - **반드시 수강(신청)할 과목** 또는 이상안에 포함된 **병목 과목**이 불명확하면, **어떤 과목 실패 시 플랜 B·C를 쓸지** 질문으로 확정한다.
  - 워크플로 **정상 종료**는 최종 HTML에 **수강 가능 목록(요약·출처)** + **이상적 시간표(사용자 입력 재현)** + **플랜 B** + **플랜 C**가 **각각 구분된 섹션**으로 갖춰진 경우로만 인정한다(아래 exit_conditions.success). 플랜 B·C는 **서로 다른 실패 가정**을 전제로 해야 한다.
  - 사용자에게 보이는 **최종 결과물은 HTML**이다. UTF-8, `lang="ko"` 권장, 표는 `<table>` 등 표준 마크업.
  - **시간(교시) 점검**: 이상안·플랜 B·플랜 C 각각에 대해 동일 섹션 안 수업의 **시간 겹침**을 검사한다. 근거상 요일·교시(또는 시각)가 있으면 반드시 검사. 겹침이 있으면 사용자 이상안은 **경고·확인 요청**, B·C는 대체로 해소하거나 불가 명시.
  - **수업 75분 가정(시간 산술)**: 시각이 없고 교시만 있을 때 등은 **한 교시 블록 = 75분** 가정(개설 근거에 시각이 있으면 우선). HTML 가정란 또는 `schedule_validation`에 한 줄 명시.
  - **구획 분리**: 수강 가능 목록·이상안·플랜 B·플랜 C를 **한 덩어리로 합쳐** B·C를 생략하거나, **이상안만** 두고 정상 종료로 처리하지 않는다.
  - **분반·담당 교수**: 개설 근거에 있으면 동일 표기. 없으면 미확인 문구(임의 생성 금지). 교수 스타일 분석은 비목표.
  - "**연강 가능 여부**는 `campus_rules.json` rule_engine을 따른다. **연강**은 앞 수업 종료~뒷 수업 시작이 **20분 이하**인 경우를 말한다. 판정 기준: (1) 건물 구역(앞자리) 차이가 3 이상이면 기본 불가; (2) rule_tree에 해당 from→to 방향의 조합이 명시되어 있으면 그 `can_connect` 값을 따른다. **rule_tree 규칙은 단방향**으로만 적용한다(from→to 명시 방향만 해당). 연강 불가로 판정된 수업 조합은 **플랜 B·C 후보에서 생성하지 않는다**. 사용자 이상안에 해당 조합이 있으면 **경고·확인 요청만** 하고 이상안 자체를 변경하지 않는다."

acceptance_criteria:
  - 3단계 파이프라인 준수:
    - Stage 1: 파일(PDF/HWP/XLSX) → 파싱 → `available_courses_catalog` JSON 저장 후 종료.
    - Stage 2: JSON 로드 → 학점·필수과목·교수·시간대·이상안 인터뷰 → `user_profile`·`preferences`·`must_take_courses`·`user_ideal_timetable` 저장.
    - Stage 3: Stage 1·2 로드 → Core → campus_route_validation → schedule_validation → 플랜 B·C 생성 → `html_report` 합성.
  - HTML 4섹션 필수: 목록 / 이상안 / 플랜B / 플랜C. 각 플랜에 실패가정·표·겹침검증·campus_route_validation 요약.
  - 근거 없는 주장 금지. 추출 실패 시 오류·다른 형식 권고 후 종료.
  - Streamlit 등은 사용자 요청 시에만.

ontology_schema:
  name: PlanUCursorMVP
  description: Cursor 기반 PlanU v1 — 이상안 입력 + 플랜 B·C 대체
  fields:
    - name: available_courses_catalog
      type: array
      description: Stage 1 출력. 개설 강의 목록 (분반·요일·교시·담당). B·C 대체 후보 풀.
    - name: user_ideal_timetable
      type: object
      description: 사용자 이상안 (불변 입력). 시스템이 임의 변경 금지.
    - name: must_take_courses
      type: array
      description: 필수 과목·병목. B·C 실패 가정 후보. 비어 있으면 인터뷰로 보완.
    - name: user_profile
      type: object
      description: 학과·학년·이수학점 등 (Stage 2 출력).
    - name: preferences
      type: object
      description: 공강·최대수업·교수 선호 등 Soft 조건 (Stage 2 출력).
    - name: evidence_sources
      type: array
      description: 파일 경로 + 채팅 인용.
    - name: extracted_corpus
      type: object
      description: 파일별 파싱 결과 또는 오류.
    - name: graduation_audit
      type: object
      description: 졸업 요건 충족·미충족·판단불가 (Hard 참고).
    - name: course_candidates
      type: array
      description: B·C 후보 필터 결과.
    - name: schedule_validation
      type: object
      description: 이상안·플랜B·플랜C 각각 시간 겹침 검사. 75분 가정 사용 시 명시.
    - name: campus_route_validation
      type: object
      description: campus_rules.json 단방향 적용. 연강(≤20분) 구간 이동 가능 여부. 불가→B·C 제외, 이상안→경고.
    - name: timetable_plans
      type: object
      description: 플랜B·C 생성 결과 (이상안은 user_ideal_timetable로 별도).
    - name: html_report
      type: string
      description: 최종 HTML. 섹션 순서: 목록→이상안→플랜B→플랜C.
    - name: optional_code_bundle
      type: string
      description: 요청 시에만.

evaluation_principles:
  - name: evidence_fidelity
    weight: 0.35
    description: 목록·이상안·대체안이 모두 근거·사용자 입력에 닿는가; 이상안을 임의 변경하지 않았는가.
  - name: pipeline_clarity
    weight: 0.25
    description: 목록 / 이상안 / B / C 구획·검증 산출이 분리되어 있는가.
  - name: actionability
    weight: 0.20
    description: >
      플랜 B·C가 **서로 다른 실패 가정**의 즉시 대안으로 쓰이는가, 표·분반·담당·겹침 요약이 있는가.
  - name: pnu_fit
    weight: 0.15
    description: campus_rules.json rule_engine(단방향)으로 건물 간 연강 가능 여부를 판정했는가; 불가 조합이 B·C에서 제외되었는가; 이상안의 불가 조합에 경고가 있는가.
  - name: failure_hygiene
    weight: 0.05
    description: 파일 추출 실패 시 명확한 오류·종료.

exit_conditions:
  success:
    - **html_report** 전달.
    - HTML에 **(1) 수강 가능 강의 목록**(근거 연결) **(2) 사용자 이상적 시간표** **(3) 플랜 B** **(4) 플랜 C**가 **서로 다른 섹션**으로 모두 있어야 **정상 종료**. 플랜 B·C 각각에 **실패 가정**, **요일별 표(분반·담당 교수)**, **시간 겹침 검증 요약**이 있어야 한다. B와 C의 **실패 가정은 서로 달라야** 한다(동일 가정 복붙 금지).
    - 이상안 섹션에도 **요일별 표** 및 **겹침 검증**(이상안 내 충돌 시 사용자 확인 유도)이 있어야 한다.
    - Hard·근거 부족 시 질문 또는 불가 기록.
  terminate_with_error:
    - 지원 형식 추출 실패 → 오류 + 다른 형식 권고 후 종료.
  defer:
    - 상호 평가·수렴, 경쟁률 예측, 교수 스타일 분석은 v2 이후.

